<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cataloged. — a fun way to learn art history</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     THEME TOKENS — light is the default brand presentation;
     [data-theme="dark"] overrides the same variable names.
     ============================================================ */
  :root{
    --bg:#EBE0BC;
    --frame:#F1E9CE;
    --card:#FFFFFF;
    --text:#000000;
    --text-dim:#5b5646;
    --shadow:0 10px 24px rgba(30,26,10,0.18);
    --shadow-sm:0 6px 14px rgba(30,26,10,0.14);
    --heart:#c9372a;
    --danger:#a8402f;
    --danger-bg:#f4ded9;
    --success:#3f7a52;
    --success-bg:#dfeadf;
    --accent:#8a6d2f;
    --accent-bg:#efe6c8;
    --glass:rgba(255,255,255,0.5);
    --glass-border:rgba(255,255,255,0.6);
    --radius-lg:28px;
    --radius-sm:8px;
    --font-serif:'Baskerville Old Face', Baskerville, 'Libre Baskerville', 'Times New Roman', serif;
    --font-sans:'Helvetica Neue', Helvetica, Arial, sans-serif;
    color-scheme: light;
  }
  [data-theme="dark"]{
    --bg:#1A191F;
    --frame:#242330;
    --card:#2E2C3B;
    --text:#FFFFFF;
    --text-dim:#b3aec2;
    --shadow:0 10px 24px rgba(0,0,0,0.5);
    --shadow-sm:0 6px 14px rgba(0,0,0,0.4);
    --heart:#e2564a;
    --danger:#d9695c;
    --danger-bg:#3a2725;
    --success:#6bbb8a;
    --success-bg:#20332a;
    --accent:#c9a24b;
    --accent-bg:#33301f;
    --glass:rgba(255,255,255,0.09);
    --glass-border:rgba(255,255,255,0.16);
    color-scheme: dark;
  }

  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-sans);
    display:flex;
    justify-content:center;
    min-height:100vh;
    transition:background-color .2s ease, color .2s ease;
  }
  .app{ width:100%; max-width:1080px; padding:0 40px; min-height:100vh; display:flex; flex-direction:column; }
  @media (max-width:640px){ .app{ padding:0 20px; } }

  /* ---------- scrolling background art grid (landing only) ---------- */
  .bg-grid{
    position:fixed; inset:0; z-index:-2;
    display:flex; gap:3px; overflow:hidden;
    opacity:0; pointer-events:none; transition:opacity .4s ease;
  }
  .bg-grid.show{ opacity:1; }
  .bg-col{ flex:1; position:relative; overflow:hidden; contain:layout paint; }
  .bg-col-track{ display:flex; flex-direction:column; gap:3px; will-change:transform; }
  .bg-col-track img{ width:100%; aspect-ratio:1; object-fit:cover; display:block; }
  @keyframes bgScroll{ from{ transform:translateY(0); } to{ transform:translateY(-50%); } }
  .bg-overlay{
    position:fixed; inset:0; z-index:-1;
    background:var(--bg); opacity:0; transition:opacity .4s ease;
    pointer-events:none;
  }
  .bg-overlay.show{ opacity:0.68; }
  [data-theme="dark"] .bg-overlay.show{ opacity:0.86; }

  /* ---------- header ---------- */
  .masthead{
    display:flex;
    align-items:center;
    justify-content:flex-start;
    padding:20px 0;
    gap:14px;
    flex:none;
  }
  .masthead-left{ display:flex; align-items:center; gap:12px; }
  .masthead-left.hidden{ display:none; }
  .masthead-right{ display:flex; align-items:center; gap:10px; margin-left:auto; }

  .logo-mark{
    font-family:var(--font-serif);
    font-size:22px;
    color:var(--text);
    margin:0;
    cursor:pointer;
    line-height:1;
  }

  .icon-btn{
    width:36px; height:36px; flex:none;
    display:flex; align-items:center; justify-content:center;
    border-radius:50%; border:none;
    background:var(--frame); color:var(--text);
    box-shadow:none; cursor:pointer;
    transition:box-shadow .15s ease, transform .15s ease;
  }
  .icon-btn:hover{ box-shadow:var(--shadow-sm); transform:translateY(-1px); }
  .icon-btn svg{ width:16px; height:16px; }

  /* ---------- main content column ---------- */
  #screen{ flex:1 0 auto; }
  .stage-wrap{ padding-top:44px; }

  /* ---------- generic buttons ---------- */
  .btn{
    position:relative;
    font-family:var(--font-sans); font-weight:700; font-size:15px;
    padding:8px 0;
    border:none;
    background:none;
    box-shadow:none;
    cursor:pointer;
    z-index:1;
  }
  .btn::before{
    content:'';
    position:absolute;
    inset:-8px -16px;
    border-radius:100px;
    background:transparent;
    border:1px solid transparent;
    box-shadow:none;
    -webkit-backdrop-filter:blur(0px);
    backdrop-filter:blur(0px);
    transition:background .2s ease, box-shadow .2s ease, backdrop-filter .2s ease, border-color .2s ease;
    z-index:-1;
    pointer-events:none;
  }
  .btn:hover::before{
    background:var(--glass);
    border-color:var(--glass-border);
    box-shadow:var(--shadow-sm);
    -webkit-backdrop-filter:blur(10px);
    backdrop-filter:blur(10px);
  }
  .btn-primary{ color:var(--text); }
  .btn-ghost{ color:var(--text-dim); }

  /* ---------- landing hero ---------- */
  .hero{ min-height:74vh; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:20px 4px; position:relative; z-index:1; }
  .hero-title{
    font-family:var(--font-serif); font-weight:700;
    font-size:clamp(70px,20vw,190px); line-height:0.95; margin:0 0 26px;
  }
  .hero-lede{ font-size:clamp(20px,3.8vw,29px); color:var(--text); margin:0 0 50px; }

  /* ---------- stage (modes / rules / login) ---------- */
  .stage-title{
    font-family:var(--font-serif); font-weight:700;
    font-size:clamp(32px,6vw,44px); margin:0 0 34px;
  }
  .stage-actions{ display:flex; justify-content:flex-start; gap:14px; align-items:center; margin-top:30px; }
  .rules-actions{ display:flex; justify-content:space-between; align-items:center; margin-top:30px; }
  .stage-body{ font-size:15px; color:var(--text-dim); line-height:1.6; margin:0 0 30px; max-width:48ch; }

  .mode-list{ display:flex; flex-direction:column; gap:6px; }
  .mode-item{
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    text-align:left; background:none; border:none;
    padding:22px 0;
    font-family:var(--font-sans); color:var(--text);
    cursor:pointer;
  }
  .mode-item:disabled{ cursor:default; }
  .mode-main{ display:flex; flex-direction:column; gap:4px; }
  .mode-name{ font-weight:700; font-size:28px; }
  .mode-item:disabled .mode-name{ color:var(--text-dim); }
  .mode-desc{ font-size:17px; color:var(--text-dim); }
  .mode-tag{
    font-family:var(--font-sans); font-size:11px;
    color:var(--text-dim); border:1px solid var(--text-dim); border-radius:100px; padding:4px 10px; flex:none;
  }

  .rules-list{ margin:0 0 8px; padding:0; list-style:none; }
  .rules-list li{
    font-size:22px; color:var(--text); line-height:1.4;
    padding:6px 0;
  }

  /* ---------- loading ---------- */
  .loading{ display:flex; flex-direction:column; align-items:center; gap:16px; padding:80px 20px; text-align:center; }
  .spinner{
    width:32px; height:32px; border-radius:50%;
    border:3px solid rgba(0,0,0,0.12); border-top-color:var(--text);
    animation:spin 0.9s linear infinite;
  }
  [data-theme="dark"] .spinner{ border-color:rgba(255,255,255,0.15); border-top-color:var(--text); }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .loading p{ color:var(--text-dim); font-size:14px; }

  .countdown{ display:flex; align-items:center; justify-content:center; min-height:50vh; }
  .countdown span{
    font-family:var(--font-serif); font-weight:700;
    font-size:clamp(80px,20vw,160px); color:var(--text);
    animation:countPop 0.35s ease-out;
  }
  @keyframes countPop{ from{ opacity:0; transform:scale(0.85); } to{ opacity:1; transform:scale(1); } }

  .error-box{ color:var(--danger); font-size:14px; line-height:1.6; }

  /* ---------- frame ---------- */
  .frame{
    position:relative;
    display:flex; align-items:center; justify-content:center;
    background:var(--frame);
    border-radius:var(--radius-lg);
    box-shadow:var(--shadow);
    min-height:280px;
    padding:22px;
    overflow:hidden;
    margin-bottom:16px;
  }
  .frame img{
    display:block;
    max-width:100%;
    max-height:52vh;
    border-radius:6px;
    opacity:0;
    transform:translateY(24px) rotate(-2deg) scale(0.95);
  }
  .frame img.thrown{ animation:throwIn .5s cubic-bezier(.2,.9,.3,1.2) forwards; }
  @keyframes throwIn{
    0%{ opacity:0; transform:translateY(24px) rotate(-2deg) scale(0.95); }
    60%{ opacity:1; transform:translateY(-3px) rotate(1deg) scale(1.01); }
    100%{ opacity:1; transform:translateY(0) rotate(0deg) scale(1); }
  }
  @media (prefers-reduced-motion: reduce){ .frame img.thrown{ animation:none; opacity:1; transform:none; } }

  .badge{
    position:absolute; top:14px; right:14px;
    font-size:12px; font-weight:700;
    padding:6px 12px; border-radius:100px;
    opacity:0; transform:translateY(-6px);
    transition:opacity .2s, transform .2s;
    background:var(--card); box-shadow:var(--shadow-sm);
  }
  .badge.show{ opacity:1; transform:translateY(0); }
  .badge.full{ color:var(--success); }
  .badge.partial{ color:var(--accent); }
  .badge.miss{ color:var(--danger); }

  .round-timer{ position:absolute; top:0; left:0; right:0; height:5px; background:rgba(0,0,0,0.12); z-index:2; }
  [data-theme="dark"] .round-timer{ background:rgba(255,255,255,0.15); }
  .round-timer-bar{ height:100%; width:100%; background:var(--success); }
  .round-timer-bar.run{ animation:shrinkBar 5s linear forwards; }
  @keyframes shrinkBar{
    0%{ width:100%; background:var(--success); }
    60%{ background:var(--accent); }
    100%{ width:0%; background:var(--danger); }
  }

  .clock-wrap{ display:flex; align-items:baseline; gap:8px; }
  .master-clock{ font-size:20px; font-weight:700; font-variant-numeric:tabular-nums; color:var(--text); transition:color .3s; }
  .master-clock.warn{ color:var(--accent); }
  .master-clock.danger{ color:var(--danger); }
  .master-clock.flash{ animation:clockFlash 0.6s ease-in-out infinite; }
  @keyframes clockFlash{ 0%,100%{ opacity:1; } 50%{ opacity:0.35; } }
  .clock-delta{ font-size:13px; font-weight:700; opacity:0; }
  .clock-delta.show{ animation:deltaFade 1.3s ease-out forwards; }
  .clock-delta.full{ color:var(--success); }
  .clock-delta.miss{ color:var(--danger); }
  @keyframes deltaFade{
    0%{ opacity:0; transform:translateY(-3px); }
    15%{ opacity:1; transform:translateY(0); }
    75%{ opacity:1; }
    100%{ opacity:0; }
  }

  .choices-binary{ grid-template-columns:1fr; }

  /* ---------- CAPTCHA ---------- */
  .captcha-prompt{
    font-family:var(--font-serif); font-weight:700;
    font-size:clamp(22px,4vw,30px); color:var(--text); margin:0 0 20px; line-height:1.3;
  }
  .captcha-prompt b{ font-weight:700; }
  .captcha-wrap{ max-width:560px; margin:0 auto; text-align:center; }
  .captcha-meta{ display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; font-size:16px; font-weight:600; color:var(--text-dim); }
  .captcha-grid{
    display:grid; grid-template-columns:repeat(3, 1fr); gap:8px;
    margin-bottom:6px;
  }
  .captcha-tile{
    position:relative; aspect-ratio:1; border:none; border-radius:6px;
    padding:0; overflow:hidden; cursor:pointer; background:var(--frame);
  }
  .captcha-tile img{
    width:100%; height:100%; object-fit:cover; display:block;
    filter:saturate(0.9) contrast(1.03);
    outline:2px solid rgba(0,0,0,0.15); outline-offset:-2px;
  }
  [data-theme="dark"] .captcha-tile img{ outline-color:rgba(255,255,255,0.15); }
  .captcha-tile::after{
    content:''; position:absolute; inset:0;
    background:rgba(0,0,0,0); transition:background .15s ease;
  }
  .captcha-tile:hover::after{ background:rgba(0,0,0,0.12); }
  .captcha-tile.locked{ pointer-events:none; }
  .captcha-mark{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:34px; font-weight:700; opacity:0; transition:opacity .1s ease;
  }
  .captcha-tile.flash-correct .captcha-mark{ opacity:1; color:var(--success); background:rgba(0,0,0,0.35); }
  .captcha-tile.flash-wrong .captcha-mark{ opacity:1; color:var(--danger); background:rgba(0,0,0,0.35); }

  .captcha-verify{ display:flex; flex-direction:column; align-items:center; gap:16px; min-height:50vh; justify-content:center; text-align:center; }
  .captcha-verify p{ color:var(--text-dim); font-size:14px; }

  /* ---------- stats row ---------- */
  .stats-row{ display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
  .hearts-row{ display:flex; gap:3px; }
  .heart-slot{ position:relative; width:18px; height:16px; flex:none; }
  .heart-slot svg{ position:absolute; top:0; left:0; width:18px; height:16px; }
  .heart-front-wrap{ position:absolute; top:0; left:0; height:16px; overflow:hidden; }
  .score-label{ font-size:15px; color:var(--text); }

  /* ---------- choices ---------- */
  .choices{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
  @media (max-width:520px){ .choices{ grid-template-columns:1fr; } }

  .choice{
    text-align:left;
    font-family:var(--font-sans);
    color:var(--text);
    background:var(--card);
    border:none;
    border-radius:var(--radius-sm);
    box-shadow:none;
    padding:16px 18px;
    cursor:pointer;
    display:flex; flex-direction:column; gap:4px;
    transition:box-shadow .15s ease, background .15s ease;
  }
  .choice:hover:not(:disabled){ box-shadow:var(--shadow-sm); }
  .choice-artist{ font-weight:700; font-size:15px; }
  .choice-era{ font-size:13px; color:var(--text-dim); }
  .choice.selected{ box-shadow:0 0 0 2px var(--text) inset; }
  .choice.opt-full{ background:var(--success-bg); }
  .choice.opt-partial{ background:var(--accent-bg); }
  .choice.opt-miss{ background:var(--danger-bg); }
  .choice:disabled{ cursor:default; }

  /* ---------- placard (reveal card) ---------- */
  .verdict-tag{ font-size:13px; font-weight:700; margin-bottom:10px; }
  .verdict-tag.full{ color:var(--success); }
  .verdict-tag.partial{ color:var(--accent); }
  .verdict-tag.miss{ color:var(--danger); }
  .placard-card{
    background:var(--card); border-radius:var(--radius-sm); box-shadow:var(--shadow-sm);
    padding:18px 20px; margin-bottom:14px;
  }
  .pc-artist{ font-weight:700; font-size:16px; margin:0 0 3px; }
  .pc-title{ font-style:italic; font-size:14.5px; margin:0 0 3px; }
  .pc-era{ font-size:14px; margin:0 0 3px; }
  .pc-medium{ font-size:13px; color:var(--text-dim); margin:0; }

  .learn-chips{ display:flex; flex-wrap:wrap; gap:7px; }
  .learn-chip{
    font-size:12.5px; font-weight:500;
    padding:7px 13px; border-radius:100px;
    background:var(--card); box-shadow:none;
    color:var(--text-dim); text-decoration:none;
    transition:box-shadow .15s ease;
  }
  .learn-chip:hover{ box-shadow:var(--shadow-sm); }

  /* ---------- review (post-game) ---------- */
  .review-list{ display:flex; flex-direction:column; gap:22px; margin-bottom:12px; }
  .review-item{ display:flex; gap:16px; align-items:flex-start; }
  .review-thumb{
    width:72px; height:72px; flex:none; object-fit:cover;
    border-radius:6px; box-shadow:var(--shadow-sm);
  }
  .review-body{ flex:1; min-width:0; }
  .review-body .placard-card{ margin-bottom:10px; }
  @media (max-width:520px){
    .review-item{ flex-direction:column; }
    .review-thumb{ width:100%; height:auto; max-height:180px; }
  }

  /* ---------- game over ---------- */
  .end-wrap{ min-height:66vh; display:flex; flex-direction:column; justify-content:space-between; text-align:center; padding:6vh 0 12vh; }
  .end-top{ margin-top:6vh; }
  .end-label{ font-size:14px; color:var(--text-dim); }
  .end-score{ font-family:var(--font-serif); font-weight:700; font-size:clamp(100px,20vw,200px); margin:10px 0 0; line-height:1; }
  .end-sub{ color:var(--text-dim); font-size:17px; margin:20px 0 0; }
  .end-actions{ display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:12px; }
  .end-actions .end-act-left{ justify-self:start; }
  .end-actions .end-act-center{ justify-self:center; }
  .end-actions .end-act-right{ justify-self:end; }
  @media (max-width:480px){
    .end-actions{ grid-template-columns:1fr; justify-items:center; gap:10px; }
    .end-actions .end-act-left, .end-actions .end-act-right{ justify-self:center; }
  }

  footer.credit{ flex:none; text-align:center; font-size:12px; color:var(--text-dim); padding:24px 0; }

  .scroll-top-btn{
    position:fixed; top:14px; left:50%; z-index:40;
    width:44px; height:44px; border-radius:50%; border:none;
    background:var(--frame); color:var(--text); box-shadow:var(--shadow);
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    opacity:0; pointer-events:none;
    transform:translateX(-50%) translateY(-12px);
    transition:opacity .2s ease, transform .2s ease;
  }
  .scroll-top-btn.show{ opacity:1; pointer-events:auto; transform:translateX(-50%) translateY(0); }
  .scroll-top-btn:hover{ opacity:0.8; }
  .scroll-top-btn svg{ width:18px; height:18px; }
</style>
</head>
<body>
<div class="bg-grid" id="bgGrid"></div>
<div class="bg-overlay" id="bgOverlay"></div>
<div class="app">
  <div class="masthead">
    <div class="masthead-left" id="mastheadLeft">
      <h1 class="logo-mark" id="logoMark">cataloged.</h1>
    </div>
    <div class="masthead-right">
      <button class="icon-btn" id="profileBtn" type="button" aria-label="Profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-6 8-6s8 2 8 6"/></svg>
      </button>
      <button class="icon-btn" id="themeBtn" type="button" aria-label="Toggle light and dark mode"></button>
    </div>
  </div>

  <div id="screen"></div>

  <footer class="credit">artworks via the Art Institute of Chicago, the Met, and the Cleveland Museum of Art — public domain only</footer>
</div>

<button class="scroll-top-btn" id="scrollTopBtn" type="button" aria-label="Scroll to top">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
</button>

<script>
(function(){

  const BRAND = 'cataloged.';

  /* ============================================================
     CONTENT CONFIG
     ============================================================ */
  const LANDING = {
    tagline: 'a fun way to learn art history',
    cta: 'start your journey'
  };

  const MODES = [
    { id:'classic', name:'Classic Quiz', desc:'name the artist and the movement', available:true },
    { id:'time', name:'Time Attack', desc:'race the clock', available:true },
    { id:'captcha', name:'CAPTCHA', desc:'prove you are human', available:true }
  ];

  const RULES = {
    classic: {
      title: 'Classic Quiz',
      items: [
        'You start with 10 hearts.',
        'A fully correct answer costs nothing.',
        'A half correct answer costs half a heart.',
        'A wrong answer costs one heart.',
        'The run ends at zero hearts, so try to beat your best.'
      ]
    },
    time: {
      title: 'Time Attack',
      items: [
        'You start with 60 seconds.',
        'Each artwork gives you 5 seconds to answer.',
        'A correct answer adds bonus time, and faster answers earn more.',
        'A wrong or missed answer costs 3 seconds.',
        'The run ends at zero seconds, so try to beat your best.'
      ]
    },
    captcha: {
      title: 'CAPTCHA',
      items: [
        'A movement is named above a grid of nine artworks.',
        'Click every tile that matches it.',
        'Right or wrong, a clicked tile is replaced with a new one.',
        'Five correct picks passes the round.',
        'Three wrong picks in a row fails it, so try to beat your best streak.'
      ]
    }
  };

  /* ============================================================
     THEME — light is the default state (no data-theme attribute).
     ============================================================ */
  const Theme = {
    STORAGE_KEY: 'cataloged-theme',
    current: 'light',
    async init(){
      let saved = null;
      try{
        if(window.storage){
          const r = await window.storage.get(this.STORAGE_KEY, false);
          if(r && r.value) saved = r.value;
        }
      } catch(e){}
      if(!saved){
        saved = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
      }
      this.apply(saved);
    },
    apply(mode){
      this.current = mode;
      if(mode === 'dark'){ document.documentElement.setAttribute('data-theme', 'dark'); }
      else { document.documentElement.removeAttribute('data-theme'); }
      this.renderIcon();
    },
    async toggle(){
      const next = this.current === 'dark' ? 'light' : 'dark';
      this.apply(next);
      try{ if(window.storage){ await window.storage.set(this.STORAGE_KEY, next, false); } }
      catch(e){}
    },
    renderIcon(){
      const btn = document.getElementById('themeBtn');

  // ---------------- FETCH: AIC ----------------
  async function fetchAIC(term){
    const fields = 'id,title,artist_title,style_title,date_display,image_id,place_of_origin,medium_display';
    const url = `https://api.artic.edu/api/v1/artworks/search?q=${encodeURIComponent(term)}`
      + `&query[term][is_public_domain]=true&fields=${fields}&limit=25`;
    try{
      const res = await fetch(url);
      if(!res.ok) return [];
      const data = await res.json();
      const needle = term.toLowerCase();
      return (data.data || [])
        .filter(a => a.image_id && a.artist_title && a.style_title)
        .filter(a => a.style_title.toLowerCase().includes(needle))
        .map(a => ({
          key: `aic-${a.id}`,
          title: a.title || '',
          artist: a.artist_title,
          era: a.style_title,
          date: a.date_display || '',
          medium: a.medium_display || '',
          img: `https://www.artic.edu/iiif/2/${a.image_id}/full/700,/0/default.jpg`,
          source: 'Art Institute of Chicago',
          sourceUrl: `https://www.artic.edu/artworks/${a.id}`,
          sourceSearchUrl: `https://www.artic.edu/collection?q=${encodeURIComponent(a.artist_title)}`
        }));
    } catch(e){ return []; }
  }

  // ---------------- FETCH: CLEVELAND ----------------
  async function fetchCleveland(term){
    const url = `https://openaccess-api.clevelandart.org/api/artworks/?q=${encodeURIComponent(term)}&has_image=1&limit=25`;
    try{
      const res = await fetch(url);
      if(!res.ok) return [];
      const data = await res.json();
      const needle = term.toLowerCase();
      return (data.data || [])
        .map(a => {
          const creator = a.creators && a.creators[0] ? a.creators[0].description : null;
          const artist = creator ? creator.split(' (')[0].trim() : null;
          const era = (a.culture && a.culture[0]) || a.type || null;
          const img = (a.images && (a.images.web || a.images.print)) ? (a.images.web ? a.images.web.url : a.images.print.url) : null;
          return { a, artist, era, img };
        })
        .filter(x => x.img && x.artist && x.era && x.era.toLowerCase().includes(needle))
        .map(x => ({
          key: `cma-${x.a.id}`,
          title: x.a.title || '',
          artist: x.artist,
          era: x.era,
          date: x.a.creation_date || '',
          medium: x.a.technique || '',
          img: x.img,
          source: 'Cleveland Museum of Art',
          sourceUrl: `https://www.clevelandart.org/art/${x.a.id}`,
          sourceSearchUrl: `https://www.clevelandart.org/art/collection/search?search_api_fulltext=${encodeURIComponent(x.artist)}`
        }));
    } catch(e){ return []; }
  }

  // ---------------- FETCH: MET (background only, slower) ----------------
  async function fetchMet(term){
    try{
      const searchUrl = `https://collectionapi.metmuseum.org/public/collection/v1/search?hasImages=true&q=${encodeURIComponent(term)}`;
      const res = await fetch(searchUrl);
      if(!res.ok) return [];
      const data = await res.json();
      const ids = (data.objectIDs || []).slice(0, 12);
      if(!ids.length) return [];
      const details = await Promise.all(ids.map(id =>
        fetch(`https://collectionapi.metmuseum.org/public/collection/v1/objects/${id}`)
          .then(r => r.ok ? r.json() : null)
          .catch(() => null)
      ));
      const needle = term.toLowerCase();
      return details
        .filter(Boolean)
        .map(o => {
          const era = o.period || o.culture || o.classification || o.dynasty || null;
          const img = o.primaryImageSmall || o.primaryImage || null;
          return { o, era, img };
        })
        .filter(x => x.o.isPublicDomain && x.img && x.o.artistDisplayName && x.era && x.era.toLowerCase().includes(needle))
        .map(x => ({
          key: `met-${x.o.objectID}`,
          title: x.o.title || '',
          artist: x.o.artistDisplayName,
          era: x.era,
          date: x.o.objectDate || '',
          medium: x.o.medium || '',
          img: x.img,
          source: 'The Metropolitan Museum of Art',
          sourceUrl: x.o.objectURL || `https://www.metmuseum.org/art/collection/search/${x.o.objectID}`,
          sourceSearchUrl: `https://www.metmuseum.org/art/collection/search?q=${encodeURIComponent(x.o.artistDisplayName)}`
        }));
    } catch(e){ return []; }
  }

  // ---------------- POOL MANAGEMENT ----------------
  const imageCache = new Map(); // key -> Image element, primes the browser cache ahead of use

  function preloadArt(item){
    if(imageCache.has(item.key)) return;
    const img = new Image();
    img.src = item.img;
    imageCache.set(item.key, img);
  }

  function isPreloaded(item){
    const img = imageCache.get(item.key);
    return !!(img && img.complete && img.naturalWidth > 0);
  }

  // Prefer an artwork whose image is already cached, so the round can
  // render (and, in Time Attack, start its timer) without waiting on
  // a network fetch. Falls back to any candidate if nothing is ready yet.
  //
  // Picks are stratified by era first, then by artwork within that era.
  // A flat random pick across the whole pool would be dominated by
  // whichever movements happen to have the most public-domain hits
  // (Impressionism, Baroque, etc.), crowding out rarer ones like
  // Ukiyo-e or Neoclassicism. Picking the era uniformly first keeps
  // the mix of movements roughly even over time regardless of how
  // lopsided the underlying pool is.
  function pickForRound(candidates){
    const byEra = {};
    candidates.forEach(a => { (byEra[a.era] = byEra[a.era] || []).push(a); });
    const eras = Object.keys(byEra);
    const era = pickRandom(eras);
    const group = byEra[era];
    const ready = group.filter(isPreloaded);
    return ready.length ? pickRandom(ready) : pickRandom(group);
  }

  function addToPool(items){
    if(!items || !items.length) return;
    const existing = new Set(state.pool.map(a => a.key));
    items.forEach(a => {
      if(!existing.has(a.key)){
        state.pool.push(a);
        existing.add(a.key);
        preloadArt(a);
      }
    });
  }

  function topUpIfLow(){
    const remaining = state.pool.length - state.usedKeys.size;
    if(remaining < 8){
      const term = TERMS[state.termCursor % TERMS.length];
      state.termCursor++;
      fetchAIC(term).then(addToPool);
      fetchCleveland(term).then(addToPool);
      fetchMet(term).then(addToPool);
    }
  }

  // Builds the scrolling background mosaic from whatever artwork has
  // loaded into the pool so far. Cheap to rebuild — it only touches
  // image src attributes, which are already cached from preloading.
  // AIC serves IIFF images at whatever width is requested in the URL.
  // Gameplay uses 700px; the background mosaic only ever shows these
  // at ~70px, so requesting a much smaller render is a lot less data
  // to pull down and decode. Other sources are left as-is.
  function thumbUrl(url){
    return url.replace(/\/full\/\d+,\/0\/default\.jpg$/, '/full/200,/0/default.jpg');
  }

  function renderBgGrid(){
    const container = document.getElementById('bgGrid');
    if(!container) return;
    if(!state.pool.length){ container.innerHTML = ''; return; }

    const cols = 20;
    const tilesPerCol = 10;
    const needed = cols * tilesPerCol;

    // Cycle through a shuffled list of unique images rather than
    // sampling independently at random — independent random picks
    // statistically clump the same handful of images together even
    // with a decent-sized pool. Cycling spreads repeats evenly, and
    // once the pool has 200+ images there are no repeats at all.
    const unique = shuffle(state.pool.map(a => thumbUrl(a.img)));
    const sequence = [];
    for(let i = 0; i < needed; i++) sequence.push(unique[i % unique.length]);
    shuffle(sequence);

    let html = '';
    let idx = 0;
    for(let c = 0; c < cols; c++){
      const dur = (40 + Math.random() * 40).toFixed(1);
      const delay = -(Math.random() * dur).toFixed(1);
      let tiles = '';
      for(let r = 0; r < tilesPerCol; r++){
        tiles += `<img src="${sequence[idx++]}" alt="" referrerpolicy="no-referrer">`;
      }
      html += `<div class="bg-col"><div class="bg-col-track" style="animation:bgScroll ${dur}s linear infinite; animation-delay:${delay}s;">${tiles}${tiles}</div></div>`;
    }
    container.innerHTML = html;
  }

  // Swaps a portion of the already-rendered tiles to freshly-arrived
  // images, in place — the scroll animation keeps running undisturbed
  // (no rebuild), but the grid visibly keeps filling in with more
  // variety for a couple of seconds as more of the pool loads in.
  // Runs exactly once, staggering individual tile swaps across ~2s
  // so the grid visibly fills in with more variety without every
  // touched tile changing in the same frame (which is what caused
  // the flashing/row-flicker when this ran on every fetch).
  function diversifyBgGridOnce(){
    const container = document.getElementById('bgGrid');
    if(!container) return;
    const images = state.pool.map(a => thumbUrl(a.img));
    if(!images.length) return;
    container.querySelectorAll('img').forEach(img => {
      if(Math.random() < 0.45){
        const delay = Math.random() * 2200;
        setTimeout(() => {
          if(!document.body.contains(img)) return;
          img.src = pickRandom(images);
        }, delay);
      }
    });
  }

  // Kicks off a small fetch on boot, before the player has chosen a
  // mode, purely so the landing page's background mosaic has real
  // artwork to show rather than sitting empty on first visit. The
  // grid builds as soon as the first results land, then gets one
  // gentle diversify pass once everything has settled — after that
  // it's left alone for the rest of the session.
  function warmPoolInBackground(){
    let built = false;
    let diversified = false;
    const onFirstData = () => {
      if(built || !state.pool.length) return;
      built = true;
      if(state.screen !== 'round') renderBgGrid();
    };
    const seedTerms = shuffle([...TERMS]).slice(0, 8);
    const promises = [];
    seedTerms.forEach(t => {
      promises.push(fetchAIC(t).then(items => { addToPool(items); onFirstData(); }));
      promises.push(fetchCleveland(t).then(items => { addToPool(items); onFirstData(); }));
    });
    Promise.allSettled(promises).then(() => {
      if(diversified) return;
      diversified = true;
      if(state.screen !== 'round') diversifyBgGridOnce();
    });
  }

  // ---------------- SCREEN: LOADING ----------------
  let loadingInterval = null;

  function stopLoadingMessages(){

  function renderError(){

  // ---------------- GAME START ----------------
  const MIN_LOADING_MS = 3000;

  // Guarantees the loading screen (and its rotating messages) stays up
  // for at least MIN_LOADING_MS, regardless of how fast the pool loads.
  // The extra time isn't wasted — ensurePool() has already kicked off
  // backgroundFillRemaining(), so more artwork keeps arriving while we wait.
  function waitMinimum(startTs){
    const remaining = MIN_LOADING_MS - (Date.now() - startTs);
    return remaining > 0 ? new Promise(resolve => setTimeout(resolve, remaining)) : Promise.resolve();
  }

  async function ensurePool(){
    if(state.pool.length >= 4) return true;

    // Seed every movement up front (AIC + Cleveland are single fast
    // calls each) so the stratified picker above always has all
    // terms to choose from, not just whichever four happened to be
    // fetched first.
    const promises = [];
    TERMS.forEach(t => {
      promises.push(fetchAIC(t).then(addToPool));
      promises.push(fetchCleveland(t).then(addToPool));
    });
    await Promise.allSettled(promises);

    if(state.pool.length < 4) return false;

    // The Met requires a per-object detail fetch per result, so it's
    // slower — let it keep filling in the background instead of
    // holding up the loading screen further.
    TERMS.forEach(t => fetchMet(t).then(addToPool));
    return true;
  }

  async function startGame(){
    renderLoading();
    const loadStart = Date.now();
    state.best = await ScoreStore.getBest();
    const ok = await ensurePool();
    if(!ok){ renderError(); return; }
    await waitMinimum(loadStart);

    state.health = 10;
    state.correctCount = 0;
    state.usedKeys.clear();
    state.history = [];
    beginRound();
  }

  // ---------------- ROUND ----------------
  function buildRound(){
    const available = state.pool.filter(a => !state.usedKeys.has(a.key));
    const source = available.length ? available : state.pool;
    const art = pickForRound(source);
    state.usedKeys.add(art.key);
    topUpIfLow();

    const others = state.pool.filter(a => a.key !== art.key);
    const artistPool = Array.from(new Set(others.map(a => a.artist))).filter(a => a !== art.artist);
    const eraPool = Array.from(new Set(others.map(a => a.era))).filter(e => e !== art.era);

    // Option B (artist right, era wrong) and option C (era right, artist wrong)
    // isolate one field each, so the partial-credit test stays meaningful.
    const wrongEraB = eraPool.length ? pickRandom(eraPool) : 'Unclassified Period';
    const wrongArtistC = artistPool.length ? pickRandom(artistPool) : 'Unrecorded Artist';

    // Option D (both wrong) is pulled from a real, unrelated artwork — not a
    // remix of wrongEraB/wrongArtistC — so the wrong answers don't collapse
    // into just two names and two movements across all four choices.
    const unrelatedCandidates = others.filter(o =>
      o.artist !== art.artist && o.era !== art.era &&
      o.artist !== wrongArtistC && o.era !== wrongEraB
    );
    const unrelated = unrelatedCandidates.length
      ? pickRandom(unrelatedCandidates)
      : others.find(o => o.artist !== art.artist && o.era !== art.era);
    const wrongArtistD = unrelated ? unrelated.artist : (artistPool.find(a => a !== wrongArtistC) || 'Unrecorded Artist');
    const wrongEraD = unrelated ? unrelated.era : (eraPool.find(e => e !== wrongEraB) || 'Unclassified Period');

    const options = shuffle([
      { artist: art.artist, era: art.era, artistRight: true, eraRight: true },
      { artist: art.artist, era: wrongEraB, artistRight: true, eraRight: false },
      { artist: wrongArtistC, era: art.era, artistRight: false, eraRight: true },
      { artist: wrongArtistD, era: wrongEraD, artistRight: false, eraRight: false }
    ]);

    return { art, options };
  }

  function beginRound(){
    stopLoadingMessages();
    state.screen = 'round';
    updateChrome();
    state.current = buildRound();
    state.answered = false;
    renderRound();
  }

  function renderRound(){
    const { art, options } = state.current;
    screenEl.innerHTML = `
      <div class="frame">
        <img id="artImg" src="${art.img}" alt="Artwork to identify" referrerpolicy="no-referrer">
        <div class="badge" id="badge"></div>
      </div>
      <div class="stats-row">
        <div class="hearts-row" id="hearts"></div>
        <div class="score-label" id="scoreLabel">score: ${formatScore(state.correctCount)}</div>
      </div>
      <div class="choices" id="choices"></div>`;

    renderHeartsInto(document.getElementById('hearts'));

    const img = document.getElementById('artImg');
    img.addEventListener('load', () => img.classList.add('thrown'));
    if(img.complete) img.classList.add('thrown');

    const choicesEl = document.getElementById('choices');
    options.forEach(opt => {
      const b = document.createElement('button');
      b.className = 'choice';
      b.innerHTML = `<span class="choice-artist">${opt.artist}</span><span class="choice-era">${opt.era}</span>`;
      b.addEventListener('click', () => handleAnswer(b, opt));
      choicesEl.appendChild(b);
    });
  }

  function handleAnswer(btn, chosen){
    if(state.answered) return;
    state.answered = true;

    let heartsLost, verdictClass, verdictLabel, badgeText;
    if(chosen.artistRight && chosen.eraRight){
      heartsLost = 0; verdictClass = 'full'; verdictLabel = 'dead on'; badgeText = 'full marks';
      state.correctCount += 1;
    } else if(chosen.artistRight || chosen.eraRight){
      heartsLost = 0.5; verdictClass = 'partial'; verdictLabel = 'half right';
      badgeText = chosen.artistRight ? 'artist right, movement wrong' : 'movement right, artist wrong';
      state.correctCount += 0.5;
    } else {
      heartsLost = 1; verdictClass = 'miss'; verdictLabel = 'missed it';
      badgeText = 'both wrong';
    }
    state.health = Math.max(0, state.health - heartsLost);

    document.querySelectorAll('.choice').forEach(c => {
      c.disabled = true;
      const label = c.querySelector('.choice-artist').textContent;
      const eraLabel = c.querySelector('.choice-era').textContent;
      const opt = state.current.options.find(o => o.artist === label && o.era === eraLabel);
      if(opt){
        if(opt.artistRight && opt.eraRight) c.classList.add('opt-full');
        else if(opt.artistRight || opt.eraRight) c.classList.add('opt-partial');
        else c.classList.add('opt-miss');
      }
    });
    btn.classList.add('selected');

    renderHeartsInto(document.getElementById('hearts'));
    document.getElementById('scoreLabel').textContent = `score: ${formatScore(state.correctCount)}`;

    const badge = document.getElementById('badge');
    badge.className = `badge show ${verdictClass}`;
    badge.textContent = badgeText;

    state.history.push({ art: state.current.art, options: state.current.options, verdictClass, verdictLabel });

    scheduleNextClassic();
  }

  function scheduleNextClassic(){
    clearTimeout(state.classicAdvanceTimer);
    state.classicAdvanceTimer = setTimeout(() => {
      if(state.health <= 0) renderGameOver();
      else beginRound();
    }, 900);
  }

  function wikiUrl(term){ return `https://en.wikipedia.org/wiki/Special:Search?search=${encodeURIComponent(term)}`; }

  function learnChips(art, options){
    const opts = (options && options.length) ? options : [{ artist: art.artist, era: art.era }];
    const uniqueArtists = Array.from(new Set(opts.map(o => o.artist)));
    const uniqueEras = Array.from(new Set(opts.map(o => o.era)));
    return [
      ...uniqueArtists.map(name => ({ label: name, url: wikiUrl(name) })),
      ...uniqueEras.map(name => ({ label: name, url: wikiUrl(name) })),
      { label: `more by ${art.artist} at ${art.source}`, url: art.sourceSearchUrl },
      { label: `view at ${art.source}`, url: art.sourceUrl }
    ];
  }

  // Builds one review-screen entry: thumbnail, verdict, full artwork
  // record, and lookup links — this is the information that used to
  // flash by mid-round; now it's browsable at the player's own pace.
  function reviewEntryHTML(entry){
    const { art, options, verdictClass, verdictLabel } = entry;
    const chips = learnChips(art, options);
    return `
      <div class="review-item">
        <img class="review-thumb" src="${art.img}" alt="" referrerpolicy="no-referrer">
        <div class="review-body">
          <div class="verdict-tag ${verdictClass}">${verdictLabel}</div>
          <div class="placard-card">
            <p class="pc-artist">${art.artist}</p>
            ${art.title ? `<p class="pc-title">${art.title}</p>` : ''}
            <p class="pc-era">${art.era}${art.date ? ', ' + art.date : ''}</p>
            ${art.medium ? `<p class="pc-medium">${art.medium}</p>` : ''}
          </div>
          <div class="learn-chips">
            ${chips.map(c => `<a class="learn-chip" href="${c.url}" target="_blank" rel="noopener noreferrer">${c.label}</a>`).join('')}
          </div>
        </div>
      </div>`;
  }

  function renderReview(){
    state.screen = 'review';
    updateChrome();
    screenEl.innerHTML = `
      <div class="stage-wrap">
        <h2 class="stage-title">review</h2>
        <div class="review-list">${state.history.map(reviewEntryHTML).join('')}</div>
      </div>`;
  }

  // ---------------- GAME OVER ----------------
  async function renderGameOver(){
    state.screen = 'gameover';
    updateChrome();
    const isRecord = state.correctCount > state.best;
    if(isRecord){ state.best = state.correctCount; await ScoreStore.setBest(state.best); }
    state.lastResult = { mode: 'classic', correct: state.correctCount, best: state.best, isRecord };
    paintGameOverClassic();
  }

  function paintGameOverClassic(){
    state.screen = 'gameover';
    updateChrome();
    const r = state.lastResult;
    screenEl.innerHTML = `
      <div class="end-wrap">
        <div class="end-top">
          <div class="end-label">out of hearts</div>

        </div>
        <div class="end-actions">
          <button class="btn btn-primary end-act-left" id="reviewBtn">review</button>

  // ================================================================
  // TIME ATTACK MODE
  // Reuses the shared pool/fetch layer, the throw-in animation, and
  // the placard reveal component. Round building, timing, and the
  // game-over screen are specific to this mode.
  // ================================================================
  const TA_MASTER_START = 60;
  const TA_ROUND_SECONDS = 5;
  const TA_PENALTY = 3;

  function formatClock(totalSeconds){
    const s = Math.max(0, Math.round(totalSeconds));
    const m = Math.floor(s / 60);
    const r = s % 60;
    return `${m}:${String(r).padStart(2, '0')}`;
  }

  function clearTATimers(){
    if(state.taTimers.masterInterval) clearInterval(state.taTimers.masterInterval);
    if(state.taTimers.roundTimeout) clearTimeout(state.taTimers.roundTimeout);
    if(state.taTimers.advance) clearTimeout(state.taTimers.advance);
    state.taTimers = { masterInterval: null, roundTimeout: null, advance: null };
  }

  function startMasterClock(){
    state.taTimers.masterInterval = setInterval(() => {
      state.masterClock -= 1;
      if(state.masterClock <= 0){
        state.masterClock = 0;
        updateMasterClockDisplay();
        endTimeAttackRun();
        return;
      }
      updateMasterClockDisplay();
    }, 1000);
  }

  function updateMasterClockDisplay(){
    const el = document.getElementById('masterClock');
    if(!el) return;
    el.textContent = formatClock(state.masterClock);
    el.classList.remove('warn', 'danger', 'flash');
    if(state.masterClock > 0 && state.masterClock <= 5){
      el.classList.add('danger', 'flash');
    } else if(state.masterClock <= 15){
      el.classList.add('warn');
    }
  }

  function showClockDelta(text, cls){
    const el = document.getElementById('clockDelta');
    if(!el) return;
    el.classList.remove('show');
    void el.offsetWidth;
    el.textContent = text;
    el.className = `clock-delta show ${cls}`;
  }

  async function startGameTimeAttack(){
    renderLoading();
    const loadStart = Date.now();
    state.taBest = await TAScoreStore.getBest();
    const ok = await ensurePool();
    if(!ok){ renderError(); return; }
    await waitMinimum(loadStart);

    clearTATimers();
    state.masterClock = TA_MASTER_START;
    state.taCorrect = 0;
    state.taSeen = 0;
    state.taEnded = false;
    state.history = [];
    state.usedKeys.clear();

    await renderCountdown();
    beginRoundTA();
    startMasterClock();
  }

  function renderCountdown(){
    const steps = ['3', '2', '1', 'Go!'];
    state.screen = 'round';
    updateChrome();
    return new Promise(resolve => {
      let i = 0;
      const paint = () => {
        screenEl.innerHTML = `<div class="countdown"><span>${steps[i]}</span></div>`;
      };
      paint();
      const interval = setInterval(() => {
        i++;
        if(i >= steps.length){
          clearInterval(interval);
          resolve();
          return;
        }
        paint();
      }, 700);
    });
  }

  function buildRoundTA(){
    const available = state.pool.filter(a => !state.usedKeys.has(a.key));
    const source = available.length ? available : state.pool;
    const art = pickForRound(source);
    state.usedKeys.add(art.key);
    topUpIfLow();

    const others = state.pool.filter(a => a.key !== art.key);
    const unrelatedCandidates = others.filter(o => o.artist !== art.artist && o.era !== art.era);
    const unrelated = unrelatedCandidates.length
      ? pickRandom(unrelatedCandidates)
      : (others.length ? pickRandom(others) : art);

    const options = shuffle([
      { artist: art.artist, era: art.era, correct: true },
      { artist: unrelated.artist, era: unrelated.era, correct: false }
    ]);

    return { art, options };
  }

  function beginRoundTA(){
    stopLoadingMessages();
    state.screen = 'round';
    updateChrome();
    state.current = buildRoundTA();
    state.answered = false;
    renderRoundTA();
  }

  // Starts the 5s window and its visual bar only once the artwork is
  // actually visible — preloading (see pickForRound/preloadArt) means
  // this fires immediately in the common case, but this is the
  // guarantee that the clock never runs before the image does.
  function armRoundTimerTA(){
    state.roundStartTs = performance.now();
    clearTimeout(state.taTimers.roundTimeout);
    state.taTimers.roundTimeout = setTimeout(() => handleTimeoutTA(), TA_ROUND_SECONDS * 1000);
    const bar = document.getElementById('roundTimerBar');
    if(bar) bar.classList.add('run');
  }

  function renderRoundTA(){
    const { art, options } = state.current;
    screenEl.innerHTML = `
      <div class="frame">
        <img id="artImg" src="${art.img}" alt="Artwork to identify" referrerpolicy="no-referrer">
        <div class="round-timer"><div class="round-timer-bar" id="roundTimerBar"></div></div>
      </div>
      <div class="stats-row">
        <div class="clock-wrap">
          <span class="master-clock" id="masterClock">${formatClock(state.masterClock)}</span>
          <span class="clock-delta" id="clockDelta"></span>
        </div>
        <div class="score-label" id="scoreLabel">correct: ${state.taCorrect}</div>
      </div>
      <div class="choices choices-binary" id="choices"></div>`;

    updateMasterClockDisplay();

    const img = document.getElementById('artImg');
    const onReady = () => { img.classList.add('thrown'); armRoundTimerTA(); };
    img.addEventListener('load', onReady);
    if(img.complete) onReady();

    const choicesEl = document.getElementById('choices');
    options.forEach(opt => {
      const b = document.createElement('button');
      b.className = 'choice';
      b.innerHTML = `<span class="choice-artist">${opt.artist}</span><span class="choice-era">${opt.era}</span>`;
      b.addEventListener('click', () => handleAnswerTA(b, opt));
      choicesEl.appendChild(b);
    });
  }

  function revealChoicesTA(){
    document.querySelectorAll('#choices .choice').forEach(c => {
      c.disabled = true;
      const label = c.querySelector('.choice-artist').textContent;
      const eraLabel = c.querySelector('.choice-era').textContent;
      const opt = state.current.options.find(o => o.artist === label && o.era === eraLabel);
      if(opt) c.classList.add(opt.correct ? 'opt-full' : 'opt-miss');
    });
  }

  function handleAnswerTA(btn, chosen){
    if(state.answered) return;
    state.answered = true;
    clearTimeout(state.taTimers.roundTimeout);

    const elapsed = (performance.now() - state.roundStartTs) / 1000;
    state.taSeen++;

    let deltaText, verdictClass, verdictLabel;
    if(chosen.correct){
      const bonus = elapsed <= 2 ? 10 : elapsed <= 4 ? 5 : 1;
      state.masterClock += bonus;
      state.taCorrect++;
      deltaText = `+${bonus}s`; verdictClass = 'full'; verdictLabel = 'correct';
    } else {
      state.masterClock = Math.max(0, state.masterClock - TA_PENALTY);
      deltaText = `−${TA_PENALTY}s`; verdictClass = 'miss'; verdictLabel = 'wrong';
    }

    revealChoicesTA();
    btn.classList.add('selected');
    showClockDelta(deltaText, verdictClass);
    updateMasterClockDisplay();
    document.getElementById('scoreLabel').textContent = `correct: ${state.taCorrect}`;
    state.history.push({ art: state.current.art, options: state.current.options, verdictClass, verdictLabel });

    scheduleNextTA();
  }

  function handleTimeoutTA(){
    if(state.answered) return;
    state.answered = true;
    state.taSeen++;
    state.masterClock = Math.max(0, state.masterClock - TA_PENALTY);

    revealChoicesTA();
    showClockDelta(`−${TA_PENALTY}s`, 'miss');
    updateMasterClockDisplay();
    state.history.push({ art: state.current.art, options: state.current.options, verdictClass: 'miss', verdictLabel: 'missed it' });

    scheduleNextTA();
  }

  function scheduleNextTA(){
    clearTimeout(state.taTimers.advance);
    state.taTimers.advance = setTimeout(() => {
      if(state.taEnded) return;
      if(state.masterClock <= 0) endTimeAttackRun();
      else beginRoundTA();
    }, 700);
  }

  async function endTimeAttackRun(){
    if(state.taEnded) return;
    state.taEnded = true;
    clearTATimers();

    const isRecord = state.taCorrect > state.taBest;
    if(isRecord){ state.taBest = state.taCorrect; await TAScoreStore.setBest(state.taBest); }
    state.lastResult = { mode: 'time', correct: state.taCorrect, seen: state.taSeen, best: state.taBest, isRecord };
    paintGameOverTA();
  }

  function paintGameOverTA(){
    state.screen = 'gameover';
    updateChrome();
    const r = state.lastResult;
    screenEl.innerHTML = `
      <div class="end-wrap">
        <div class="end-top">
          <div class="end-label">time's up</div>
          <p class="end-score">${r.correct}</p>
          <p class="end-sub">${r.seen} seen · ${r.isRecord ? 'new best' : `best ${r.best}`}</p>
        </div>
        <div class="end-actions">
          <button class="btn btn-primary end-act-left" id="reviewBtn">review</button>
          <button class="btn btn-primary end-act-center" id="againBtn">play again</button>
          <button class="btn btn-primary end-act-right" id="backBtn">back</button>
        </div>
      </div>`;
    document.getElementById('againBtn').addEventListener('click', startGameTimeAttack);
    document.getElementById('reviewBtn').addEventListener('click', renderReview);
    document.getElementById('backBtn').addEventListener('click', renderModes);
  }

  // ================================================================
  // CAPTCHA MODE — "prove you're human (art edition)"
  // A 3x3 grid of artworks; click every tile matching the named
  // movement. Each click (right or wrong) is evaluated immediately
  // and the tile is replaced with a fresh one. Untimed, self-paced,
  // like a real CAPTCHA. Reuses the shared pool/fetch layer.
  // ================================================================
  const CAPTCHA_WIN = 5;
  const CAPTCHA_FAIL_STREAK = 3;
  const CAPTCHA_GRID_SIZE = 9;

  async function startGameCaptcha(){
    renderLoading();
    const loadStart = Date.now();
    state.captchaBest = await CaptchaScoreStore.getBest();
    const ok = await ensurePool();
    if(!ok){ renderError(); return; }
    await waitMinimum(loadStart);

    state.captchaCleared = 0;
    state.history = [];
    state.usedKeys.clear();
    beginCaptchaRound();
  }

  function eraGroups(){
    const byEra = {};
    state.pool.forEach(a => { (byEra[a.era] = byEra[a.era] || []).push(a); });
    return byEra;
  }

  function pickCaptchaTarget(){
    const byEra = eraGroups();
    // Favor movements with enough depth to keep refilling correct
    // tiles without immediately running out of fresh matches.
    const deep = Object.keys(byEra).filter(e => byEra[e].length >= 4);
    const pool = deep.length ? deep : Object.keys(byEra);
    return pickRandom(pool);
  }

  // Picks one artwork for a tile, excluding anything already showing
  // elsewhere in the grid so the same piece never appears twice at once.
  function pickCaptchaArt(matchTarget, excludeKeys){
    const byEra = eraGroups();
    let candidates;
    if(matchTarget){
      candidates = (byEra[state.captchaTarget] || []).filter(a => !excludeKeys.includes(a.key));
    } else {
      candidates = state.pool.filter(a => a.era !== state.captchaTarget && !excludeKeys.includes(a.key));
    }
    if(!candidates.length) candidates = state.pool.filter(a => !excludeKeys.includes(a.key));
    if(!candidates.length) candidates = state.pool;
    return pickForRound(candidates);
  }

  function beginCaptchaRound(){
    state.screen = 'round';
    updateChrome();
    state.captchaTarget = pickCaptchaTarget();
    state.captchaCorrect = 0;
    state.captchaWrongStreak = 0;
    state.captchaMistakes = 0;
    state.captchaLocked = new Set();

    // Randomize how many of the 9 starting tiles match, so the grid
    // can't be pattern-memorized round to round.
    const matchCount = 2 + Math.floor(Math.random() * 4); // 2..5
    const tiles = [];
    for(let i = 0; i < CAPTCHA_GRID_SIZE; i++){
      const shouldMatch = i < matchCount;
      const excludeKeys = tiles.map(t => t.key);
      const art = pickCaptchaArt(shouldMatch, excludeKeys);
      tiles.push(art);
    }
    state.captchaTiles = shuffle(tiles);
    topUpIfLow();
    renderCaptchaGrid();
  }

  function renderCaptchaGrid(){
    screenEl.innerHTML = `
      <div class="captcha-wrap">
        <p class="captcha-prompt">Select every square with <b>${state.captchaTarget}</b>.</p>
        <div class="captcha-meta">
          <span>${state.captchaCorrect} / ${CAPTCHA_WIN} correct</span>
          <span>${state.captchaWrongStreak} / ${CAPTCHA_FAIL_STREAK} wrong in a row</span>
        </div>
        <div class="captcha-grid" id="captchaGrid"></div>
      </div>`;

    const grid = document.getElementById('captchaGrid');
    state.captchaTiles.forEach((art, idx) => {
      const b = document.createElement('button');
      b.className = 'captcha-tile';
      b.dataset.idx = idx;
      b.innerHTML = `<img src="${art.img}" alt="" referrerpolicy="no-referrer"><span class="captcha-mark"></span>`;
      b.addEventListener('click', () => handleCaptchaTileClick(idx));
      grid.appendChild(b);
    });
  }

  function handleCaptchaTileClick(idx){
    if(state.captchaLocked.has(idx)) return;
    state.captchaLocked.add(idx);

    const art = state.captchaTiles[idx];
    const correct = art.era === state.captchaTarget;
    const tileEl = document.querySelector(`.captcha-tile[data-idx="${idx}"]`);
    tileEl.classList.add('locked', correct ? 'flash-correct' : 'flash-wrong');
    tileEl.querySelector('.captcha-mark').textContent = correct ? '✓' : '✕';

    state.history.push({
      art,
      verdictClass: correct ? 'full' : 'miss',
      verdictLabel: correct ? 'matched' : 'no match'
    });

    if(correct){
      state.captchaCorrect++;
      state.captchaWrongStreak = 0;
    } else {
      state.captchaWrongStreak++;
      state.captchaMistakes++;
    }

    setTimeout(() => {
      if(!document.getElementById('captchaGrid')) return;
      if(state.captchaCorrect >= CAPTCHA_WIN){ captchaVerify(true); return; }
      if(state.captchaWrongStreak >= CAPTCHA_FAIL_STREAK){ captchaVerify(false); return; }

      // Replace this tile — right or wrong — with a fresh, freshly
      // randomized artwork (not guaranteed to match or not).
      const excludeKeys = state.captchaTiles.map(t => t.key);
      const shouldMatch = Math.random() < 0.4;
      state.captchaTiles[idx] = pickCaptchaArt(shouldMatch, excludeKeys);
      topUpIfLow();

      const img = tileEl.querySelector('img');
      img.src = state.captchaTiles[idx].img;
      tileEl.classList.remove('locked', 'flash-correct', 'flash-wrong');
      tileEl.querySelector('.captcha-mark').textContent = '';
      state.captchaLocked.delete(idx);

      document.querySelector('.captcha-meta span:first-child').textContent = `${state.captchaCorrect} / ${CAPTCHA_WIN} correct`;
      document.querySelector('.captcha-meta span:last-child').textContent = `${state.captchaWrongStreak} / ${CAPTCHA_FAIL_STREAK} wrong in a row`;
    }, 380);
  }

  function captchaVerify(passed){
    state.screen = 'round';
    screenEl.innerHTML = `
      <div class="captcha-verify">
        <div class="spinner"></div>
        <p>verifying…</p>
      </div>`;
    setTimeout(() => {
      if(state.screen !== 'round') return;
      if(passed) captchaPass();
      else captchaFail();
    }, 900);
  }

  const CAPTCHA_PASS_LINES = {
    flawless: ["suspiciously too human…", "not one mistake. suspicious.", "too clean. we're onto you."],
    clean: ["impressively human.", "barely broke a sweat.", "verified, and it wasn't close."],
    normal: ["certifiably not a robot.", "verified: human, probably.", "you may proceed, human."],
    rough: ["verified, but it was close.", "human confirmed. barely.", "that was more stressful than it needed to be."]
  };
  const CAPTCHA_FAIL_LINES = {
    none: ["definitely a robot.", "the machines have you outnumbered.", "0 for 3. rough start."],
    some: ["try again, human.", "so close, and yet a robot.", "the machines win this round."],
    close: ["almost human.", "one wrong move from freedom.", "so close to certified."]
  };

  function captchaPassLine(mistakes){
    const tier = mistakes === 0 ? 'flawless' : mistakes === 1 ? 'clean' : mistakes === 2 ? 'normal' : 'rough';
    return pickRandom(CAPTCHA_PASS_LINES[tier]);
  }
  function captchaFailLine(correctCount){
    const tier = correctCount === 0 ? 'none' : correctCount <= 2 ? 'some' : 'close';
    return pickRandom(CAPTCHA_FAIL_LINES[tier]);
  }

  async function captchaPass(){
    state.captchaCleared++;
    const isRecord = state.captchaCleared > state.captchaBest;
    if(isRecord){ state.captchaBest = state.captchaCleared; await CaptchaScoreStore.setBest(state.captchaBest); }
    state.lastResult = { mode: 'captcha', passed: true, line: captchaPassLine(state.captchaMistakes) };
    paintCaptchaResult();
  }

  async function captchaFail(){
    const isRecord = state.captchaCleared > state.captchaBest;
    if(isRecord){ state.captchaBest = state.captchaCleared; await CaptchaScoreStore.setBest(state.captchaBest); }
    state.lastResult = { mode: 'captcha', passed: false, line: captchaFailLine(state.captchaCorrect) };
    paintCaptchaResult();
  }

  function paintCaptchaResult(){
    state.screen = 'gameover';
    updateChrome();
    const r = state.lastResult;
    screenEl.innerHTML = `
      <div class="end-wrap">
        <div class="end-top">
          <p class="end-score" style="font-size:clamp(34px,6vw,58px); line-height:1.2;">${r.line}</p>
        </div>
        <div class="end-actions">
          <button class="btn btn-primary end-act-left" id="reviewBtn">review</button>
          <button class="btn btn-primary end-act-center" id="againBtn">${r.passed ? 'next captcha' : 'play again'}</button>
          <button class="btn btn-primary end-act-right" id="backBtn">back</button>
        </div>
      </div>`;
    document.getElementById('reviewBtn').addEventListener('click', renderReview);
    document.getElementById('backBtn').addEventListener('click', renderModes);
    document.getElementById('againBtn').addEventListener('click', () => {
      if(r.passed) beginCaptchaRound();
      else startGameCaptcha();
    });
  }

  // ---------------- BOOT ----------------
  async function boot(){
    await Theme.init();
    document.getElementById('themeBtn').addEventListener('click', () => Theme.toggle());
    document.getElementById('profileBtn').addEventListener('click', renderLogin);
    document.getElementById('logoMark').addEventListener('click', () => {
      if(state.screen !== 'loading') renderLanding();
    });
    renderLanding();
    warmPoolInBackground();

    const scrollBtn = document.getElementById('scrollTopBtn');
    window.addEventListener('scroll', () => {
      scrollBtn.classList.toggle('show', window.scrollY > 300);
    });
    scrollBtn.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  }

  boot();
})();
</script>
</body>
</html>
