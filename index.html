<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cataloged. — a fun way to learn art history</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg-grid" id="bgGrid"></div>
<div class="bg-overlay" id="bgOverlay"></div>
<div class="static-wall" id="staticWall"></div>
<div class="app">
  <div class="masthead">
    <div class="masthead-left" id="mastheadLeft">
      <h1 class="logo-mark" id="logoMark">cataloged.</h1>
    </div>
    <div class="masthead-right">
      <button class="icon-btn" id="profileBtn" type="button" aria-label="Profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-6 8-6s8 2 8 6"/></svg>
      </button>
      <button class="icon-btn" id="themeBtn" type="button" aria-label="Toggle light and dark mode"></button>
    </div>
  </div>

  <div id="screen"></div>

  <footer class="credit">artworks via the Art Institute of Chicago, the Met, and the Cleveland Museum of Art — public domain only</footer>
</div>

<button class="scroll-top-btn" id="scrollTopBtn" type="button" aria-label="Scroll to top">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
</button>


<script src="js/config.js"></script>
<script src="js/state.js"></script>
<script src="js/api-sources.js"></script>
<script src="js/pool.js"></script>
<script src="js/spotlight.js"></script>
<script src="js/screens-nav.js"></script>
<script src="js/game-classic.js"></script>
<script src="js/review.js"></script>
<script src="js/game-timeattack.js"></script>
<script src="js/game-captcha.js"></script>
<script src="js/main.js"></script>
</body>
</html>
